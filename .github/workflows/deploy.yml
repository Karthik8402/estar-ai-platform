name: 🚀 Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  GITHUB_USERNAME: karthik8402
  RESOURCE_GROUP: eSTAR-RG

jobs:
  # ─── Job 1: Build & Push Backend ──────────────────────────
  build-backend:
    name: 🔧 Build Audit Trail Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GITHUB_USERNAME }}/audit-trail-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./services/audit-trail-service
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Build & Push Frontend ─────────────────────────
  build-frontend:
    name: 🎨 Build Landing Page
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for frontend image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GITHUB_USERNAME }}/landing-page
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./landing-page
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inject the Azure API URL at build time so Vite bakes it into the JS bundle
          build-args: |
            VITE_API_GATEWAY_URL=https://audit-trail-service.ambitiousforest-7d7bdb17.southeastasia.azurecontainerapps.io
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to Azure (only on main branch) ─────────
  deploy:
    name: ☁️ Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy audit-trail-service
        run: |
          az containerapp update \
            --name audit-trail-service \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.GITHUB_USERNAME }}/audit-trail-service:sha-${{ steps.sha.outputs.short }}

      - name: Deploy landing-page
        run: |
          az containerapp update \
            --name landing-page \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.GITHUB_USERNAME }}/landing-page:sha-${{ steps.sha.outputs.short }}

      - name: ✅ Deployment complete
        run: |
          echo "✅ Both services deployed successfully!"
          echo "🌐 Landing Page: https://landing-page.ambitiousforest-7d7bdb17.southeastasia.azurecontainerapps.io"
          echo "🔌 API: https://audit-trail-service.ambitiousforest-7d7bdb17.southeastasia.azurecontainerapps.io"
